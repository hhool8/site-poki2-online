<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b18"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Gradient ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#glow)" stroke-width="3"/>
  <!-- Text: P2 -->
  <text x="32" y="41" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="26" fill="url(#glow)" text-anchor="middle" letter-spacing="-1">P2</text>
</svg>
