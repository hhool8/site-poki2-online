<section class="page-content">
  <div class="container" style="max-width:960px;text-align:center">
    <div style="text-align:center;margin-bottom:2rem">
      <h1 style="font-size:clamp(1.9rem,4vw,2.6rem);margin-bottom:.75rem">Search Poki2</h1>
    </div>

    <form id="site-search-form" action="/search/" method="get" role="search" aria-label="Search Poki2" style="display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;margin-bottom:1.5rem">
      <input
        id="site-search-input"
        type="search"
        name="q"
        placeholder="Search games…"
        aria-label="Search query"
        maxlength="100"
        style="flex:1 1 420px;min-width:260px;max-width:680px;padding:.95rem 1.1rem;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;font-size:1rem;outline:none"
      >
      <button class="btn btn-primary" type="submit">Search</button>
    </form>

    <div id="site-search-results" style="display:grid;gap:1rem;justify-items:center"></div>
    <nav id="site-search-pagination" aria-label="Search result pages" style="display:flex;gap:.45rem;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:1.25rem"></nav>
  </div>
</section>

<script>
(function () {
  var form = document.getElementById('site-search-form');
  var input = document.getElementById('site-search-input');
  var results = document.getElementById('site-search-results');
  var pagination = document.getElementById('site-search-pagination');
  if (!form || !input || !results || !pagination) return;

  var params = new URLSearchParams(window.location.search);
  var query = (params.get('q') || '').trim();
  var currentPage = Math.max(parseInt(params.get('p') || '1', 10) || 1, 1);
  input.value = query;

  function getPageSize() {
    return window.matchMedia('(max-width: 768px)').matches ? 8 : 16;
  }

  function buildPageUrl(term, page) {
    var nextParams = new URLSearchParams();
    if (term) nextParams.set('q', term);
    if (page > 1) nextParams.set('p', String(page));
    var text = nextParams.toString();
    return text ? '/search/?' + text : '/search/';
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function score(item, term) {
    var hay = (item.title + ' ' + item.description + ' ' + (item.tags || '')).toLowerCase();
    var total = 0;
    if (item.title && item.title.toLowerCase() === term) total += 100;
    if (item.title && item.title.toLowerCase().indexOf(term) === 0) total += 40;
    if (item.title && item.title.toLowerCase().indexOf(term) !== -1) total += 20;
    if (hay.indexOf(term) !== -1) total += 10;
    return total;
  }

  function render(items, term) {
    if (!term) {
      results.innerHTML = '';
      pagination.innerHTML = '';
      return;
    }

    var lower = term.toLowerCase();
    var matches = items
      .filter(function (item) { return item.type === 'game'; })
      .map(function (item) { return { item: item, score: score(item, lower) }; })
      .filter(function (entry) { return entry.score > 0; })
      .sort(function (a, b) { return b.score - a.score || a.item.title.localeCompare(b.item.title); })
      .map(function (entry) { return entry.item; });

    var pageSize = getPageSize();
    var totalPages = Math.max(Math.ceil(matches.length / pageSize), 1);
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    var start = (currentPage - 1) * pageSize;
    var pageItems = matches.slice(start, start + pageSize);

    results.innerHTML = pageItems.map(function (item) {
      var thumb = item.image
        ? '<img src="' + esc(item.image) + '" alt="" loading="lazy" style="width:72px;height:72px;object-fit:cover;border-radius:12px;flex-shrink:0">'
        : '<div style="width:72px;height:72px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);flex-shrink:0"></div>';
      return '<a href="' + esc(item.url) + '" style="display:flex;gap:1rem;align-items:flex-start;padding:1rem 1.1rem;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);text-decoration:none;color:inherit;max-width:960px;width:100%;text-align:left">'
        + thumb
        + '<span style="display:flex;flex-direction:column;gap:.35rem;min-width:0">'
        + '<span style="display:flex;align-items:center;gap:.55rem;flex-wrap:wrap">'
        + '<strong style="font-size:1rem;color:#fff">' + esc(item.title) + '</strong>'
        + '<span style="font-size:.72rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#22d3ee;background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.2);padding:.2rem .45rem;border-radius:999px">Game</span>'
        + '</span>'
        + '<span style="font-size:.92rem;color:#94a3b8;line-height:1.6">' + esc(item.description || '') + '</span>'
        + '<span style="font-size:.84rem;color:#22d3ee">' + esc(item.url.replace('https://poki2.online', '')) + '</span>'
        + '</span>'
        + '</a>';
    }).join('');

    if (totalPages <= 1) {
      pagination.innerHTML = '';
      return;
    }

    var pages = [];
    pages.push(1);
    if (currentPage - 1 > 2) pages.push('dots-left');
    for (var i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pages.push(i);
    if (currentPage + 1 < totalPages - 1) pages.push('dots-right');
    if (totalPages > 1) pages.push(totalPages);

    var prevDisabled = currentPage <= 1 ? 'disabled' : '';
    var nextDisabled = currentPage >= totalPages ? 'disabled' : '';
    var html = '<button type="button" data-page="' + (currentPage - 1) + '" ' + prevDisabled + ' style="padding:.45rem .72rem;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:' + (currentPage <= 1 ? 'rgba(255,255,255,.04)' : 'rgba(255,255,255,.08)') + ';color:#e2e8f0;cursor:' + (currentPage <= 1 ? 'not-allowed' : 'pointer') + '">Prev</button>';
    html += pages.map(function (p) {
      if (typeof p !== 'number') {
        return '<span style="padding:.45rem .2rem;color:#94a3b8">...</span>';
      }
      var active = p === currentPage;
      return '<button type="button" data-page="' + p + '" style="min-width:2.15rem;padding:.45rem .6rem;border-radius:999px;border:1px solid ' + (active ? 'rgba(34,211,238,.5)' : 'rgba(255,255,255,.18)') + ';background:' + (active ? 'rgba(34,211,238,.22)' : 'rgba(255,255,255,.08)') + ';color:' + (active ? '#67e8f9' : '#e2e8f0') + ';font-weight:' + (active ? '700' : '500') + ';cursor:pointer">' + p + '</button>';
    }).join('');
    html += '<button type="button" data-page="' + (currentPage + 1) + '" ' + nextDisabled + ' style="padding:.45rem .72rem;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:' + (currentPage >= totalPages ? 'rgba(255,255,255,.04)' : 'rgba(255,255,255,.08)') + ';color:#e2e8f0;cursor:' + (currentPage >= totalPages ? 'not-allowed' : 'pointer') + '">Next</button>';
    pagination.innerHTML = html;
  }

  fetch('/search-index.json')
    .then(function (res) { return res.json(); })
    .then(function (items) { render(items, query); })
    .catch(function () {
      results.innerHTML = '';
      pagination.innerHTML = '';
    });

  pagination.addEventListener('click', function (event) {
    var target = event.target;
    if (!(target instanceof HTMLElement)) return;
    var page = parseInt(target.getAttribute('data-page') || '', 10);
    if (!page || page < 1 || target.hasAttribute('disabled')) return;
    window.location.href = buildPageUrl(query, page);
  });

  form.addEventListener('submit', function (event) {
    event.preventDefault();
    var next = input.value.trim();
    var nextUrl = buildPageUrl(next, 1);
    window.location.href = nextUrl;
  });

  var mq = window.matchMedia('(max-width: 768px)');
  function onViewportChange() {
    if (!query) return;
    fetch('/search-index.json')
      .then(function (res) { return res.json(); })
      .then(function (items) { render(items, query); })
      .catch(function () {
        results.innerHTML = '';
        pagination.innerHTML = '';
      });
  }
  if (typeof mq.addEventListener === 'function') {
    mq.addEventListener('change', onViewportChange);
  } else if (typeof mq.addListener === 'function') {
    mq.addListener(onViewportChange);
  }
})();
</script>
