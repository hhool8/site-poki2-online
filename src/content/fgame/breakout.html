<h2>What Is Breakout?</h2>
<p>Breakout is a brick-breaking arcade classic — bounce the ball and clear all bricks to progress.</p>

<h2>How to Play</h2>
<p>Move the paddle to keep the ball in play and target brick formations strategically.</p>

<h2>Controls</h2>
<ul>
  <li><strong>Mouse / Arrow Keys</strong> — move paddle</li>
</ul>
