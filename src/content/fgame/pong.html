<h2>What Is Pong?</h2>
<p>Pong is the original table-tennis arcade game — two paddles and a ball in competitive matches.</p>

<h2>How to Play</h2>
<p>Control your paddle and return the ball. Score when your opponent misses.</p>

<h2>Controls</h2>
<ul>
  <li><strong>W / S</strong> and <strong>Up / Down</strong> — paddle movement</li>
</ul>
